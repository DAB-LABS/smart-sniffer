<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="haGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2240"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#4a9eff">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="12" fill="#111111"/>

  <!-- Agent column header -->
  <text x="175" y="38" text-anchor="middle" fill="#888" font-size="12" font-weight="600" letter-spacing="2">YOUR MACHINES</text>

  <!-- Agent box 1: Proxmox -->
  <rect x="40" y="55" width="270" height="95" rx="8" fill="url(#agentGrad)" stroke="#444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="80" fill="#ccc" font-size="11" font-weight="600" letter-spacing="1">PROXMOX HOST</text>
  <text x="60" y="102" fill="#4a9eff" font-size="13" font-weight="700">smartha-agent</text>
  <text x="178" y="102" fill="#666" font-size="12">:9099</text>
  <line x1="60" y1="112" x2="290" y2="112" stroke="#333" stroke-width="1"/>
  <text x="60" y="130" fill="#888" font-size="11">Samsung 870 EVO  &#x2022;  WD Black NVMe</text>
  <text x="60" y="143" fill="#888" font-size="11">External USB (no SMART)</text>

  <!-- Agent box 2: NAS -->
  <rect x="40" y="170" width="270" height="75" rx="8" fill="url(#agentGrad)" stroke="#444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="195" fill="#ccc" font-size="11" font-weight="600" letter-spacing="1">NAS / WORKSTATION</text>
  <text x="60" y="217" fill="#4a9eff" font-size="13" font-weight="700">smartha-agent</text>
  <text x="178" y="217" fill="#666" font-size="12">:9099</text>
  <line x1="60" y1="227" x2="290" y2="227" stroke="#333" stroke-width="1"/>
  <text x="60" y="240" fill="#888" font-size="11">Seagate Barracuda x4</text>

  <!-- Agent box 3: Mac -->
  <rect x="40" y="262" width="270" height="58" rx="8" fill="url(#agentGrad)" stroke="#444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="287" fill="#ccc" font-size="11" font-weight="600" letter-spacing="1">MACBOOK / DESKTOP</text>
  <text x="60" y="307" fill="#4a9eff" font-size="13" font-weight="700">smartha-agent</text>
  <text x="178" y="307" fill="#666" font-size="12">:9099</text>

  <!-- Arrows -->
  <line x1="320" y1="102" x2="530" y2="140" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHead)"/>
  <line x1="320" y1="207" x2="530" y2="180" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHead)"/>
  <line x1="320" y1="291" x2="530" y2="210" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHead)"/>

  <!-- Arrow labels -->
  <text x="420" y="108" text-anchor="middle" fill="#666" font-size="10" transform="rotate(-5,420,108)">JSON / HTTP</text>
  <text x="420" y="196" text-anchor="middle" fill="#666" font-size="10" transform="rotate(3,420,196)">JSON / HTTP</text>
  <text x="420" y="260" text-anchor="middle" fill="#666" font-size="10" transform="rotate(10,420,260)">JSON / HTTP</text>

  <!-- HA column header -->
  <text x="690" y="38" text-anchor="middle" fill="#888" font-size="12" font-weight="600" letter-spacing="2">HOME ASSISTANT</text>

  <!-- HA box -->
  <rect x="540" y="55" width="330" height="268" rx="8" fill="url(#haGrad)" stroke="#4a9eff" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- HA integration label -->
  <text x="560" y="82" fill="#4a9eff" font-size="14" font-weight="700">smart_sniffer integration</text>
  <line x1="560" y1="92" x2="850" y2="92" stroke="#1a4a7a" stroke-width="1"/>

  <!-- Device 1 -->
  <rect x="560" y="102" width="290" height="44" rx="5" fill="#162d47" stroke="#1a4a7a" stroke-width="1"/>
  <text x="575" y="120" fill="#fff" font-size="12" font-weight="600">Samsung 870 EVO 500GB</text>
  <text x="575" y="138" fill="#6ab04c" font-size="11">Attention: NO  &#x2022;  Health: OK  &#x2022;  38&#xB0;C</text>

  <!-- Device 2 -->
  <rect x="560" y="154" width="290" height="44" rx="5" fill="#162d47" stroke="#1a4a7a" stroke-width="1"/>
  <text x="575" y="172" fill="#fff" font-size="12" font-weight="600">WD Black NVMe 1TB</text>
  <text x="575" y="190" fill="#6ab04c" font-size="11">Attention: NO  &#x2022;  Health: OK  &#x2022;  42&#xB0;C</text>

  <!-- Device 3 -->
  <rect x="560" y="206" width="290" height="44" rx="5" fill="#162d47" stroke="#1a4a7a" stroke-width="1"/>
  <text x="575" y="224" fill="#fff" font-size="12" font-weight="600">Seagate Barracuda 4TB</text>
  <text x="575" y="242" fill="#f9ca24" font-size="11">Attention: MAYBE  &#x2022;  Health: OK  &#x2022;  35&#xB0;C</text>

  <!-- Device 4 -->
  <rect x="560" y="258" width="290" height="44" rx="5" fill="#162d47" stroke="#1a4a7a" stroke-width="1"/>
  <text x="575" y="276" fill="#fff" font-size="12" font-weight="600">External USB 1TB</text>
  <text x="575" y="294" fill="#888" font-size="11">Attention: UNSUPPORTED  &#x2022;  Health: Unknown</text>

  <!-- Lock icon area for auth -->
  <rect x="422" y="137" width="60" height="22" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="435" y="153" fill="#4a9eff" font-size="11">&#x1F512; Auth</text>
</svg>
