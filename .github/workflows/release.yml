# Build and publish SMART Sniffer Agent binaries on tagged releases.
#
# Trigger: push a tag like v0.1.0
# git tag v0.1.0
# git push origin v0.1.0
#
# The workflow:
# 1. Checks out the code
# 2. Cross-compiles for all supported platforms
# 3. Generates SHA256 checksums
# 4. Creates a GitHub Release with all artifacts attached

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        working-directory: agent
        run: make all VERSION=${{ steps.version.outputs.VERSION }}

      - name: Generate checksums
        working-directory: agent/build
        run: |
          sha256sum smartha-agent-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SMART Sniffer Agent v${{ steps.version.outputs.VERSION }}
          body: |
            ## SMART Sniffer Agent v${{ steps.version.outputs.VERSION }}

            <!-- 🔴 IMPORTANT: Replace this section with version-specific changes before tagging. -->
            <!-- Example: -->
            <!-- ### What's New -->
            <!-- - **Raspberry Pi support** — armv7 binary now included for Pi 2/3/4 (32-bit OS) -->
            <!-- - **Seagate fix** — resolved false Command Timeout alerts on Seagate/OEM drives -->

            ### What's New
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details on this release.

            ---

            ### ⚡ Update Your Agents
            **Already have agents running?** Update them to match this release:
            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```
            Run this on each machine where the agent is installed. The installer detects your existing configuration and offers to keep it — just press Enter to upgrade in place.

            ---

            ### Fresh Install

            **Linux / macOS (one command):**
            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            **Windows (PowerShell as Admin):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            ### Manual Download
            Download the binary for your platform below, then see the [README](https://github.com/${{ github.repository }}#installation) for manual installation instructions.

            ### Checksums
            Verify your download with `sha256sum -c checksums.txt`.
          files: |
            agent/build/smartha-agent-linux-amd64
            agent/build/smartha-agent-linux-arm64
            agent/build/smartha-agent-linux-arm
            agent/build/smartha-agent-darwin-amd64
            agent/build/smartha-agent-darwin-arm64
            agent/build/smartha-agent-windows-amd64.exe
            agent/build/checksums.txt
          generate_release_notes: true
